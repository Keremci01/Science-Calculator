<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Graph</title>
<script src="https://www.desmos.com/api/v1.6/calculator.js?apiKey=abc123"></script>

<style>
html,body{
margin:0;
height:100%;
}

#calculator{
width:100%;
height:100%;
}
</style>

</head>

<body>

<div id="calculator"></div>

<script>

window.addEventListener("load", function(){

const elt = document.getElementById("calculator");

const calculator = Desmos.GraphingCalculator(elt,{
expressions:true,
settingsMenu:true,
zoomButtons:true,
keypad:true
});

calculator.setExpression({
id:"1",
latex:"y=x^2"
});

});

</script>

</body>
</html>
