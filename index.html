<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Graph</title>

<style>
html,body{
margin:0;
height:100%;
}

#calculator{
width:100%;
height:100vh;
}
</style>

</head>

<body>

<div id="calculator"></div>

<script src="https://www.desmos.com/api/v1.6/calculator.js?apiKey=abc123"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

var elt = document.getElementById("calculator");

var calculator = Desmos.GraphingCalculator(elt);

calculator.setExpression({
id:"1",
latex:"y=x^2"
});

});

</script>

</body>
</html>
