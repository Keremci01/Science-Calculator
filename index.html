<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafikler</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <h2>Menü</h2>

    <div class="menu-group" onclick="toggleGroup('g1')">
        Hareket Grafikleri ▼
    </div>
    <div class="submenu" id="g1">
        <div class="menu-item" onclick="showPage('surat')">Sürat - Zaman</div>
        <div class="menu-item" onclick="showPage('konum')">Konum - Zaman</div>
        <div class="menu-item" onclick="showPage('ivme')">İvme - Zaman</div>
    </div>

    <div class="menu-group" onclick="toggleGroup('g2')">
        Grafik Analizi ▼
    </div>
    <div class="submenu" id="g2">
        <div class="menu-item">Artan - Azalan</div>
        <div class="menu-item">Sabit Grafik</div>
        <div class="menu-item">Yorumlama</div>
    </div>
</div>

<div class="main" id="main">

    <!-- SÜRAT -->
    <div id="suratPage">
        <div class="container">
            <h1>Sürat - Zaman Grafiği</h1>

            <div class="controls">
                <input type="number" id="speed" placeholder="Sürat (m/s)">
                <input type="number" id="time" placeholder="Zaman (s)">
                <button onclick="addData()">Ekle</button>
                <button onclick="clearData()">Temizle</button>
            </div>

            <canvas id="chart"></canvas>
        </div>
    </div>

    <!-- KONUM -->
    <div id="konumPage" style="display:none;">
        <div class="container">
            <h1>Konum - Zaman Grafiği</h1>
            <p>Buraya konum grafiği gelecek</p>
        </div>
    </div>

    <!-- İVME -->
    <div id="ivmePage" style="display:none;">
        <div class="container">
            <h1>İvme - Zaman Grafiği</h1>
            <p>Buraya ivme grafiği gelecek</p>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
