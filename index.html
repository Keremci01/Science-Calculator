<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafikler</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <h2>Menü</h2>

    <div class="menu-group" onclick="toggleGroup('g1')">
        Hareket Grafikleri ▼
    </div>
    <div class="submenu" id="g1">
        <div class="menu-item" onclick="showPage('surat')">Sürat - Zaman</div>
        <div class="menu-item" onclick="showPage('konum')">Konum - Zaman</div>
        <div class="menu-item" onclick="showPage('ivme')">İvme - Zaman</div>
    </div>

    <div class="menu-group" onclick="toggleGroup('g2')">
        Grafik Analizi ▼
    </div>
    <div class="submenu" id="g2">
        <div class="menu-item" onclick="showPage('artan')">Artan - Azalan</div>
        <div class="menu-item" onclick="showPage('sabit')">Sabit Grafik</div>
        <div class="menu-item" onclick="showPage('yorum')">Yorumlama</div>
    </div>
</div>

<div class="main" id="main">
    <div class="container">
        <h1 id="title">Sürat - Zaman Grafiği</h1>

        <div class="controls">
            <input type="number" id="speed" placeholder="Değer">
            <input type="number" id="time" placeholder="Zaman (s)">
            <button onclick="addData()">Ekle</button>
            <button onclick="clearData()">Temizle</button>
        </div>

        <canvas id="chart"></canvas>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
