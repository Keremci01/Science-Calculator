<!DOCTYPE html>
<html>
<head>
<title>Function Calculator</title>
<script src="https://www.desmos.com/api/v1.6/calculator.js?apiKey=desmos"></script>
</head>

<body>

<h2>Fonksiyon Yaz</h2>

<input id="func" placeholder="x^2">

<br><br>

<div id="calculator" style="width:800px;height:500px;"></div>

<script>

var elt = document.getElementById("calculator");
var calculator = Desmos.GraphingCalculator(elt);

document.getElementById("func").addEventListener("input", function(){

  var f = this.value;

  calculator.setExpression({
    id:"graph1",
    latex:`y=${f}`
  });

});

</script>

</body>
</html>
