<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Function Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>

<style>
body{
font-family:Arial;
margin:20px;
}

#plot{
width:100%;
height:500px;
}
</style>

</head>

<body>

<h2>Fonksiyon Yaz</h2>

<input id="func" value="x^2">
<button onclick="draw()">Grafiği Çiz</button>

<div id="plot"></div>

<script>

function draw(){

var f = document.getElementById("func").value;

functionPlot({
target:'#plot',
width:800,
height:500,
grid:true,
data:[{
fn:f
}]
});

}

window.onload = draw;

</script>

</body>
</html>
