<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Math Calculator</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">
<h3>Menu</h3>
<button onclick="setMode('function')">Function Graph</button>
<button onclick="setMode('derivative')">Derivative Graph</button>
<button onclick="setMode('integral')">Integral Area</button>
</div>

<div id="content">

<h2 id="title">Function Graph</h2>

<input id="func" value="x^2">

<input id="a" type="number" placeholder="a" style="display:none">
<input id="b" type="number" placeholder="b" style="display:none">

<button onclick="draw()">Draw Graph</button>

<div id="plot"></div>

</div>

<script>

let mode="function";

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display = m.style.display==="block" ? "none" : "block";
}

function setMode(m){

mode=m;
toggleMenu();

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";

if(mode==="function"){
document.getElementById("title").innerText="Function Graph";
}

if(mode==="derivative"){
document.getElementById("title").innerText="Derivative Graph";
}

if(mode==="integral"){
document.getElementById("title").innerText="Integral Area";
document.getElementById("a").style.display="inline";
document.getElementById("b").style.display="inline";
}

}

function draw(){

let f=document.getElementById("func").value;

if(mode==="function"){

functionPlot({
target:"#plot",
width:800,
height:500,
grid:true,
data:[{fn:f}]
});

}

if(mode==="derivative"){

let d=math.derivative(f,"x").toString();

functionPlot({
target:"#plot",
width:800,
height:500,
grid:true,
data:[{fn:d}]
});

}

if(mode==="integral"){

let a=parseFloat(document.getElementById("a").value);
let b=parseFloat(document.getElementById("b").value);

functionPlot({
target:"#plot",
width:800,
height:500,
grid:true,
data:[
{fn:f,color:"black"},
{fn:f,range:[a,b],closed:true,color:"skyblue"},
{fn:`${a}`,range:[-10,10],color:"black"},
{fn:`${b}`,range:[-10,10],color:"black"}
]
});

}

}

window.onload=draw;

</script>

</body>
</html>
