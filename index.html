<!DOCTYPE html>
<html>
<head>
<title>Function Calculator</title>

<script src="https://www.desmos.com/api/v1.6/calculator.js?apiKey=desmos"></script>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
}

#calculator{
  width:100%;
  height:100vh;
}

#panel{
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div id="panel">
<input id="func" placeholder="x^2">
</div>

<div id="calculator"></div>

<script>

var elt = document.getElementById("calculator");
var calculator = Desmos.GraphingCalculator(elt);

document.getElementById("func").addEventListener("input", function(){

  var f = this.value;

  calculator.setExpression({
    id:"graph1",
    latex:`y=${f}`
  });

});

</script>

</body>
</html>
