<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Function Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>

<style>
body{
font-family: Arial;
margin:0;
overflow:hidden;
}

#plot{
width:100vw;
height:100vh;
}
</style>

</head>

<body>

<h2>Fonksiyon Yaz</h2>

<input id="func" placeholder="x^2" value="x^2">
<button onclick="draw()">Grafiği Çiz</button>

<div id="plot"></div>

<script>

function draw(){

var f = document.getElementById("func").value;

functionPlot({
target: '#plot',
width: 900,
height: 500,
grid: true,
data: [{
fn: f
}]
});

}

window.onload = draw;

</script>

</body>
</html>
