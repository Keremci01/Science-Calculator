<!DOCTYPE html>
<html>
<head>
<title>Function Calculator</title>
<script src="https://www.desmos.com/api/v1.6/calculator.js"></script>
</head>

<body>

<h2>Fonksiyon Yaz</h2>

<input id="func" placeholder="y=x^2">

<button onclick="draw()">Grafiği Çiz</button>

<div id="calculator" style="width:600px;height:400px;"></div>

<script>
var elt = document.getElementById('calculator');
var calculator = Desmos.GraphingCalculator(elt);

function draw(){
var f = document.getElementById("func").value;
calculator.setExpression({id:'graph1', latex:f});
}
</script>

</body>
</html>
